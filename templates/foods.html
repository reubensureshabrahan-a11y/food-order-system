<html>
<head>
    <title>Foods</title>
</head>
<body>

<h1>Food List</h1>

   {% for food in foods %}

<div>

    <img src="{{ food[4] }}" width="150">

    <p>
        {{ food[1] }} - ₹{{ food[2] }} - {{ food[3] }}
    </p>

    <a href="/addtocart/{{ food[0] }}">Add to Cart</a>

    <a href="/editfood/{{ food[0] }}">Edit</a>

    <a href="/deletefood/{{ food[0] }}">Delete</a>

</div>

<hr>

{% endfor %}

 

</body>
</html>
