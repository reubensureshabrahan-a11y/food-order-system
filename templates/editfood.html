<html>
<head>
    <title>Edit Food</title>
</head>
<body>
    <h1>Edit Food</h1>
    <form method="POST">
        <label>Food Name:</label><br>
        <input type="text" name="food_name" value="{{ food[1] }}"><br><br>
        <label>Price:</label><br>
        <input type="number" name="price" value="{{ food[2] }}"><br><br>
        <label>Category:</label><br>
        <input type="text" name="category" value="{{ food[3] }}"><br><br>
        <button type="submit">Update Food</button>
    </form>
</body>
</html>
